<header
  data-fls-header
  data-fls-header-scroll
  data-fls-header-scroll-show="1000"
  class="header"
>
  <div class="header__content">
    <div class="header__container">
      <div class="header__body">
        <a class="header__logo" aria-label="YevGenes — головна">YevGenes</a>
        <include
          src="@components/layout/menu/menu-ua.html"
          locals='{"active":"[[active]]","lang":"uk"}'
        ></include>

        <div class="header__buttons" data-fls-dynamic=".menu__body,991.98">
          <button
            type="button"
            class="lang-switch"
            id="lang-switch"
            aria-label="Перемкнути мову на англійську"
          >
            <span class="lang-switch__option lang-switch__option--en">En</span>
            <span class="lang-switch__option lang-switch__option--uk">Укр</span>
          </button>

          <div class="theme-toggle">
            <button
              class="theme-toggle__btn"
              data-fls-darklite-set
              aria-label="Перемкнути тему"
            >
              <span class="theme-toggle__icon"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
